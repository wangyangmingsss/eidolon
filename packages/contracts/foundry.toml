[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
verbosity = 2
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
testnet = "${OG_RPC_URL_TESTNET}"
mainnet = "${OG_RPC_URL_MAINNET}"

[etherscan]
testnet = { key = "no-key-needed", url = "https://chainscan-newton.0g.ai/api" }
mainnet = { key = "no-key-needed", url = "https://chainscan.0g.ai/api" }
